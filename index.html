<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>커스텀 슬라이더 위젯</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <style>
    html, body { position: relative; height: 100%; margin: 0; padding: 0; background: transparent; }
    .swiper { width: 100%; height: 100%; }
    .swiper-slide { text-align: center; font-size: 18px; background: transparent; display: flex; justify-content: center; align-items: center; }
    .swiper-slide img { display: block; width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>
  <div class="swiper mySwiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide"><img src="https://youtu.be/n97vHH9u8UE" alt="slide"></div>
      <div class="swiper-slide"><img src="https://youtu.be/av0adLlloB0" alt="slide"></div>
      <div class="swiper-slide"><img src="https://youtu.be/o47KoqCd1XQ" alt="slide"></div>
      <div class="swiper-slide"><img src="https://youtu.be/oM2LBRtI7kY" alt="slide"></div>

    </div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-pagination"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    var swiper = new Swiper(".mySwiper", {
      spaceBetween: 0,
      centeredSlides: true,
      autoplay: { delay: 2500, disableOnInteraction: false, },
      pagination: { el: ".swiper-pagination", clickable: true, },
      navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev", },
    });
  </script>
</body>
</html>
