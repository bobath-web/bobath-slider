<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>유튜브 캐러셀 위젯</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <style>
    /* 위젯 배경 완벽 투명화 */
    html, body { position: relative; height: 100%; margin: 0; padding: 0; background: transparent !important; font-family: sans-serif; }
    
    /* 슬라이더 전체 영역 (화살표와 그림자가 잘리지 않게 여백 확보) */
    .swiper { width: 100%; max-width: 1200px; padding: 40px 50px; box-sizing: border-box; }
    
    /* 카드 디자인 (둥근 모서리, 그림자, 마우스 오버 시 살짝 떠오르는 효과) */
    .swiper-slide {
      background: transparent;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      transition: transform 0.3s ease;
    }
    .swiper-slide:hover { transform: translateY(-8px); }
    
    /* 유튜브 영상 16:9 비율 고정 유지 */
    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      background: #000;
    }
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* 좌우 화살표 디자인 (흰색 원형 배경 + 파란색 화살표) */
    .swiper-button-next, .swiper-button-prev {
      color: #0056b3; 
      background: #ffffff;
      width: 45px; height: 45px;
      border-radius: 50%;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }
    .swiper-button-next:after, .swiper-button-prev:after { font-size: 20px; font-weight: bold; }
    
    /* 하단 페이지네이션 점 */
    .swiper-pagination-bullet-active { background: #0056b3; }
  </style>
</head>
<body>

  <div class="swiper mySwiper">
    <div class="swiper-wrapper">

      <div class="swiper-slide">
        <div class="video-container">
          <iframe src="https://www.youtube.com/embed/n97vHH9u8UE?rel=0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
      </div>

      <div class="swiper-slide">
        <div class="video-container">
          <iframe src="https://www.youtube.com/embed/30TtvBri99c?rel=0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
      </div>

      <div class="swiper-slide">
        <div class="video-container">
          <iframe src="https://www.youtube.com/embed/oM2LBRtI7kY?rel=0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
      </div>

    </div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-pagination"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    var swiper = new Swiper(".mySwiper", {
      slidesPerView: 1, /* 모바일에서는 1개씩 보임 */
      spaceBetween: 20,
      grabCursor: true,
      pagination: { el: ".swiper-pagination", clickable: true },
      navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
      breakpoints: {
        768: { slidesPerView: 2, spaceBetween: 30 }, /* 태블릿에서는 2개 */
        1024: { slidesPerView: 3, spaceBetween: 40 }, /* PC화면에서는 3개 (사진과 동일) */
      }
    });
  </script>
</body>
</html>
